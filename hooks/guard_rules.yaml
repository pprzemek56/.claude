dangerous:
  # ── Destrukcyjne usuwanie ──────────────────────────────────────
  - pattern: '\brm\s+(-[a-zA-Z]*r[a-zA-Z]*f|-[a-zA-Z]*f[a-zA-Z]*r)\b'
    reason: 'rm -rf'
  - pattern: '\brm\s+.*\s+/\s*$'
    reason: 'rm na /'
  - pattern: '\brm\s+.*\s+(\$HOME|~)(\s|/|$)'
    reason: 'rm na $HOME'
  - pattern: '\brm\s+-rf?\s+\.git\b'
    reason: 'kasowanie .git'

  # ── Dysk / system plików ───────────────────────────────────────
  - pattern: '>\s*/dev/sd[a-z]'
    reason: 'zapis do urządzenia blokowego'
  - pattern: '\bdd\s+.*of=/dev/'
    reason: 'dd of=/dev/'
  - pattern: '\bmkfs\.'
    reason: 'mkfs'

  # ── Git destrukcyjne ───────────────────────────────────────────
  - pattern: '\bgit\s+push\s+(-f\b|--force\b|--force-with-lease\b)'
    reason: 'git push --force'
  - pattern: '\bgit\s+reset\s+--hard\s+(origin|HEAD~)'
    reason: 'git reset --hard na origin/HEAD~'
  - pattern: '\bgit\s+clean\s+-[a-z]*(fd|df)[a-z]*\b'
    reason: 'git clean -fd'
  - pattern: '\bgit\s+checkout\s+\.\s*$'
    reason: 'git checkout . (nadpisze lokalne zmiany)'

  # ── Eskalacja uprawnień ────────────────────────────────────────
  - pattern: '\bsudo\b'
    reason: 'sudo'
  - pattern: '\bchmod\s+(-R\s+)?[0-7]*777'
    reason: 'chmod 777'
  - pattern: '\b(passwd|usermod|userdel|useradd|groupadd)\b'
    reason: 'manipulacja userami/grupami'

  # ── Sieć → wykonanie (download & run) ──────────────────────────
  - pattern: '\b(curl|wget)\b[^|;]*\|\s*(sh|bash|zsh|python\d?)\b'
    reason: 'curl | sh'

  # ── Eksfiltracja / shell config ────────────────────────────────
  - pattern: '\b(cat|less|more|head|tail)\s+[^|;&]*\.env(\s|$)'
    reason: 'czytanie .env'
  - pattern: '(>>?|tee\s+)\s*[~/][^\s]*(\.bashrc|\.zshrc|\.profile|\.bash_profile)'
    reason: 'modyfikacja shell rc'
  - pattern: '(^|\s|/)\.ssh/'
    reason: 'dotykanie ~/.ssh'
  - pattern: '\baws\s+configure\b'
    reason: 'aws configure (poświadczenia)'

  # ── Obfuskacja / exec ──────────────────────────────────────────
  - pattern: '\bbase64\s+(-d|--decode)\b.*\|\s*(sh|bash|python\d?)'
    reason: 'base64 -d | sh (obfuskacja)'
  - pattern: '\beval\s+["'']?\$\('
    reason: 'eval $(...)'
  - pattern: ':\(\)\s*\{\s*:\|:&\s*\};:'
    reason: 'fork bomb'

# ── Wyjątki: jeśli sub-komenda matchuje któryś z tych, allow mimo wszystko ──
exceptions:
  - pattern: '\brm\s+(-[a-zA-Z]+\s+)?(\./)?(temporary|tmp|tmp_work|\.cache|node_modules|\.pytest_cache|__pycache__)/'
    reason: 'rm w sandbox/cache'
  - pattern: '\bsudo\s+-n\s+true\b'
    reason: 'sprawdzenie czy sudo działa (no-op)'
  # rm tylko gdy KAŻDY target jest w claude_work/
  - pattern: '^\s*rm(\s+-[a-zA-Z]+)*(\s+(/|\./)?claude_work/\S*)+\s*$'
    reason: 'rm w claude_work/'
  # rmdir
  - pattern: '^\s*rmdir(\s+-[a-zA-Z]+)*(\s+(/|\./)?claude_work/\S*)+\s*$'
    reason: 'rmdir w claude_work/'
  # unlink
  - pattern: '^\s*unlink\s+(/|\./)?claude_work/\S+\s*$'
    reason: 'unlink w claude_work/'
  # find -delete wystartowane z claude_work/
  - pattern: '^\s*find\s+(/|\./)?claude_work/\S*(\s+[^;&|]+)*\s+-delete\s*$'
    reason: 'find -delete w claude_work/'